[package]
name = "aggrs"
version = "0.2.0"
edition = "2021"

[dependencies]
anyhow = "1.0.95"
clap = { version = "4.5.23", features = ["derive"] }
colored = "2.2.0"
csv = "1.3.1"
rayon = "1.10.0"
regex = "1.11.1"
serde = "1.0.216"
serde_json = "1.0.134"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
debug = false
